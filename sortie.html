<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Stock - Sortie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gestion de Stock</h1>
            <p>Sortir un produit du stock</p>
        </div>
        <nav class="nav">
            <a href="index.html">Entree stock</a>
            <a href="sortie.html" class="actif">Sortie stock</a>
            <a href="evolution.html">Evolution stock</a>
        </nav>
        <label for="select-article">Produit</label>
        <select id="select-article">
            <option value="">-- Choisir un produit --</option>
        </select>
        <div id="info-dispo" class="info-dispo"></div>
        <label for="quantite">Quantite a sortir</label>
        <input type="number" id="quantite" placeholder="Ex : 5" min="1">
        <button id="btn-sortie" class="rouge">- Sortir du stock</button>
        <div id="message" class="message"></div>
        <hr class="separateur">
        <p style="color:#888; font-size:0.85em; text-align:center;">
            Une erreur sera affichee si la quantite demandee
            depasse le stock disponible.
        </p>
    </div>
    <script src="sortie.js"></script>
</body>
</html>
